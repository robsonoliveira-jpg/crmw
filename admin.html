<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — CRM do WhatsApp</title>
    <style>
      :root {
        --bg: #070b18;
        --card: rgba(17, 24, 49, 0.68);
        --muted: #a8b7d9;
        --text: #f4f7ff;
        --primary: #6d8dff;
        --primary-dark: #4f73f0;
        --success: #41d88d;
        --danger: #ff6b6b;
        --border: rgba(132, 160, 255, 0.28);
        --radius: 16px;
        --shadow: 0 18px 45px rgba(1, 8, 25, 0.45);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: radial-gradient(circle at 12% 8%, rgba(109,141,255,0.2), transparent 30%),
                    radial-gradient(circle at 88% 0%, rgba(71,214,255,0.14), transparent 28%),
                    var(--bg);
        color: var(--text);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }

      /* LOGIN */
      .login-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .login-box {
        background: linear-gradient(180deg, rgba(29,40,79,0.95), rgba(17,24,49,0.95));
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 40px 36px;
        width: min(400px, 92vw);
        box-shadow: var(--shadow);
        text-align: center;
      }
      .login-box h1 { margin: 0 0 6px; font-size: 1.5rem; }
      .login-box p { color: var(--muted); margin: 0 0 28px; font-size: 0.92rem; }
      .login-box input {
        width: 100%;
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 13px 14px;
        color: var(--text);
        font-size: 1rem;
        outline: none;
        margin-bottom: 14px;
        transition: border-color 0.2s;
      }
      .login-box input:focus { border-color: var(--primary); }
      .login-box input::placeholder { color: rgba(168,183,217,0.45); }
      .btn {
        display: inline-block;
        width: 100%;
        background: var(--primary);
        color: white;
        padding: 13px 18px;
        border-radius: 10px;
        border: none;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        box-shadow: 0 10px 24px rgba(79,115,240,0.34);
        transition: background 0.2s, transform 0.2s;
      }
      .btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
      .btn-danger {
        background: rgba(255,107,107,0.15);
        border: 1px solid rgba(255,107,107,0.4);
        color: var(--danger);
        box-shadow: none;
        font-size: 0.85rem;
        padding: 8px 16px;
        width: auto;
      }
      .btn-danger:hover { background: rgba(255,107,107,0.25); transform: none; }
      .btn-export {
        background: rgba(65,216,141,0.15);
        border: 1px solid rgba(65,216,141,0.4);
        color: var(--success);
        box-shadow: none;
        font-size: 0.85rem;
        padding: 8px 16px;
        width: auto;
      }
      .btn-export:hover { background: rgba(65,216,141,0.25); transform: none; }
      .error-msg { color: var(--danger); font-size: 0.88rem; margin-top: 10px; }

      /* ADMIN */
      #admin-panel { display: none; padding: 32px 0; }
      .container { width: min(1100px, 94vw); margin: 0 auto; }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 28px;
        flex-wrap: wrap;
        gap: 12px;
      }
      .topbar h1 { margin: 0; font-size: 1.4rem; }
      .topbar-actions { display: flex; gap: 10px; align-items: center; }
      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
        margin-bottom: 28px;
      }
      .stat-card {
        background: linear-gradient(180deg, rgba(29,40,79,0.7), rgba(17,24,49,0.55));
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px 20px;
      }
      .stat-value { font-size: 1.8rem; font-weight: 700; }
      .stat-label { color: var(--muted); font-size: 0.84rem; margin-top: 2px; }
      .table-wrap {
        background: linear-gradient(180deg, rgba(29,40,79,0.7), rgba(17,24,49,0.55));
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow);
      }
      .table-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
      }
      .table-header h2 { margin: 0; font-size: 1rem; }
      .search-input {
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 12px;
        color: var(--text);
        font-size: 0.88rem;
        outline: none;
        width: 220px;
        transition: border-color 0.2s;
      }
      .search-input:focus { border-color: var(--primary); }
      .search-input::placeholder { color: rgba(168,183,217,0.45); }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
      }
      thead th {
        padding: 12px 20px;
        text-align: left;
        color: var(--muted);
        font-weight: 500;
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border-bottom: 1px solid var(--border);
        background: rgba(255,255,255,0.02);
      }
      tbody tr {
        border-bottom: 1px solid rgba(132,160,255,0.1);
        transition: background 0.15s;
      }
      tbody tr:last-child { border-bottom: none; }
      tbody tr:hover { background: rgba(109,141,255,0.06); }
      tbody td { padding: 14px 20px; vertical-align: middle; }
      .badge-new {
        display: inline-block;
        background: rgba(65,216,141,0.15);
        color: var(--success);
        border: 1px solid rgba(65,216,141,0.35);
        border-radius: 999px;
        font-size: 0.75rem;
        padding: 2px 8px;
        margin-left: 8px;
      }
      .empty-state {
        text-align: center;
        padding: 56px 20px;
        color: var(--muted);
      }
      .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
      .wpp-link {
        color: var(--success);
        text-decoration: none;
        font-size: 0.85rem;
      }
      .wpp-link:hover { text-decoration: underline; }
      @media (max-width: 700px) {
        .stats { grid-template-columns: 1fr 1fr; }
        .search-input { width: 140px; }
        thead th:nth-child(3), tbody td:nth-child(3) { display: none; }
      }
    </style>
  </head>
  <body>

    <!-- LOGIN -->
    <div class="login-wrap" id="login-wrap">
      <div class="login-box">
        <div style="font-size:2rem;margin-bottom:8px;">🔐</div>
        <h1>Área Administrativa</h1>
        <p>CRM do WhatsApp — acesso restrito</p>
        <input type="password" id="senha-input" placeholder="Digite a senha" onkeydown="if(event.key==='Enter') login()" />
        <button class="btn" onclick="login()">Entrar</button>
        <div class="error-msg" id="erro-login"></div>
      </div>
    </div>

    <!-- PAINEL ADMIN -->
    <div id="admin-panel">
      <div class="container">
        <div class="topbar">
          <h1>📋 Leads cadastrados</h1>
          <div class="topbar-actions">
            <button class="btn btn-export" onclick="exportCSV()">⬇ Exportar CSV</button>
            <button class="btn btn-danger" onclick="logout()">Sair</button>
          </div>
        </div>

        <div class="stats">
          <div class="stat-card">
            <div class="stat-value" id="stat-total">0</div>
            <div class="stat-label">Total de leads</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stat-hoje">0</div>
            <div class="stat-label">Cadastros hoje</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stat-semana">0</div>
            <div class="stat-label">Últimos 7 dias</div>
          </div>
        </div>

        <div class="table-wrap">
          <div class="table-header">
            <h2>Todos os leads</h2>
            <input class="search-input" type="text" id="search" placeholder="🔍 Buscar..." oninput="renderTabela()" />
          </div>
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Nome</th>
                <th>E-mail</th>
                <th>WhatsApp</th>
                <th>Data</th>
                <th>Ação</th>
              </tr>
            </thead>
            <tbody id="tabela-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const SENHA = "admin123"; // ← altere para sua senha
      const APPS_SCRIPT_URL = "COLE_SUA_URL_AQUI"; // ← mesma URL do Apps Script

      function login() {
        const val = document.getElementById("senha-input").value;
        if (val === SENHA) {
          document.getElementById("login-wrap").style.display = "none";
          document.getElementById("admin-panel").style.display = "block";
          carregarLeads();
        } else {
          document.getElementById("erro-login").textContent = "Senha incorreta.";
          document.getElementById("senha-input").value = "";
        }
      }

      function logout() {
        document.getElementById("login-wrap").style.display = "flex";
        document.getElementById("admin-panel").style.display = "none";
        document.getElementById("senha-input").value = "";
      }

      let todosLeads = [];

      async function carregarLeads() {
        document.getElementById("tabela-body").innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--muted)">⏳ Carregando leads...</td></tr>`;
        try {
          const res = await fetch(APPS_SCRIPT_URL + "?action=get");
          const data = await res.json();
          todosLeads = data.leads || [];
        } catch {
          // fallback para localStorage
          todosLeads = JSON.parse(localStorage.getItem("crmw_leads") || "[]");
        }
        renderStats();
        renderTabela();
      }

      function renderStats() {
        const leads = todosLeads;
        const hoje = new Date().toLocaleDateString("pt-BR");
        const semanaAtras = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
        document.getElementById("stat-total").textContent = leads.length;
        document.getElementById("stat-hoje").textContent = leads.filter(l => l.data && l.data.startsWith(hoje)).length;
        document.getElementById("stat-semana").textContent = leads.filter(l => {
          if (!l.data) return false;
          const partes = l.data.split(",")[0].split("/");
          return new Date(`${partes[2]}-${partes[1]}-${partes[0]}`) >= semanaAtras;
        }).length;
      }

      function renderTabela() {
        const q = document.getElementById("search").value.toLowerCase();
        const filtrados = q ? todosLeads.filter(l =>
          (l.nome||"").toLowerCase().includes(q) ||
          (l.email||"").toLowerCase().includes(q) ||
          (l.whatsapp||"").includes(q)
        ) : todosLeads;

        const hoje = new Date().toLocaleDateString("pt-BR");
        const tbody = document.getElementById("tabela-body");

        if (filtrados.length === 0) {
          tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="icon">📭</div><p>Nenhum lead cadastrado ainda.</p></div></td></tr>`;
          return;
        }

        tbody.innerHTML = filtrados.map((l, i) => {
          const isNovo = l.data && l.data.startsWith(hoje);
          const numero = (l.whatsapp || "").replace(/\D/g, "");
          return `<tr>
            <td style="color:var(--muted)">${i + 1}</td>
            <td><strong>${l.nome || "—"}</strong>${isNovo ? '<span class="badge-new">novo</span>' : ""}</td>
            <td>${l.email || "—"}</td>
            <td>${l.whatsapp || "—"}</td>
            <td style="color:var(--muted);font-size:0.85rem">${l.data || "—"}</td>
            <td><a class="wpp-link" href="https://wa.me/55${numero}" target="_blank">💬 Chamar</a></td>
          </tr>`;
        }).join("");
      }

      function exportCSV() {
        const leads = todosLeads;
        if (!leads.length) return alert("Nenhum lead para exportar.");
        const header = "Nome,Email,WhatsApp,Data";
        const rows = leads.map(l => `"${l.nome}","${l.email}","${l.whatsapp}","${l.data}"`);
        const blob = new Blob([[header, ...rows].join("\n")], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = "leads-crmw.csv"; a.click();
        URL.revokeObjectURL(url);
      }
    </script>
  </body>
</html>
